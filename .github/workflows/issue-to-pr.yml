name: Issue To PR

# 从投稿 Issue 自动导入图片并生成 Pull Request。
# 保持每一步职责明确，便于将此 workflow 直接复制到其他图片库仓库。

on:
  issues:
    types:
      - opened
      - edited

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  import-images:
    # 只处理符合模板结构的 Issue，避免普通讨论帖触发导入逻辑。
    if: contains(github.event.issue.body, '### Game') && contains(github.event.issue.body, '### Characters') && contains(github.event.issue.body, '### Images')
    runs-on: ubuntu-latest

    steps:
      # 拉取完整历史，后续创建分支和推送 PR 都依赖完整仓库状态。
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 使用固定 Node 版本，避免 sharp 预编译包在不同 runner 环境表现不一致。
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 将 webhook 的 issue payload 落盘，供 Node 脚本按本地文件方式读取。
      - name: Persist issue payload
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.mkdirSync('.tmp', { recursive: true });
            fs.writeFileSync('.tmp/issue.json', JSON.stringify(context.payload.issue, null, 2));

      # 仓库不提交 package.json，因此在 runner 临时目录安装运行时依赖。
      - name: Install runtime dependencies in runner temp
        run: npm install --prefix "$RUNNER_TEMP/image-index-runtime" sharp nanoid

      # 执行导入主流程，输出本次新增条目列表供后续步骤复用。
      - name: Import images from issue
        env:
          NODE_PATH: ${{ runner.temp }}/image-index-runtime/node_modules
        run: node scripts/process-issue.js --issue .tmp/issue.json --output .tmp/result.json

      # 将生成的数据提交到独立分支，再创建 PR 交由维护者审阅。
      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          BRANCH="submission/issue-${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add data meta characters
          git commit -m "chore: import images from issue #${ISSUE_NUMBER}"
          git push --set-upstream origin "$BRANCH"

          PR_BODY=$(node -e "const r=JSON.parse(require('fs').readFileSync('.tmp/result.json','utf8'));const lines=['Closes #${ISSUE_NUMBER}','','Imported from ${ISSUE_URL}','','## 导入结果',''];lines.push('- 新增图片: '+r.created.length+' 张');if(r.resolved_characters&&r.resolved_characters.length) lines.push('- 已匹配角色: '+r.resolved_characters.join(', '));if(r.new_characters&&r.new_characters.length) lines.push('- 新角色待审核: '+r.new_characters.join(', '));console.log(lines.join('\\\\n'));")

          if ! gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BRANCH" \
            --title "chore: import images from issue #${ISSUE_NUMBER}" \
            --body "$PR_BODY"; then
            echo "::error::Please enable: Settings > Actions > General > Allow GitHub Actions to create and approve pull requests"

            gh issue comment "$ISSUE_NUMBER" \
              --body "⚠️ Repository configuration required.

          Please enable:

          **Settings → Actions → General**

          ✓ Allow GitHub Actions to create and approve pull requests"

            exit 1
          fi

      # 回写 Issue 评论，让投稿者能立刻看到系统已处理哪些图片。
      - name: Comment back to issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('.tmp/result.json', 'utf8'));
            const lines = [
              '## 投稿处理完成',
              '',
              `已生成 ${result.created.length} 张图片条目：`,
              '',
              ...result.created.map((id) => `- \`${id}\``)
            ];
            if (result.resolved_characters && result.resolved_characters.length) {
              lines.push('', `已匹配角色：${result.resolved_characters.join('、')}`);
            }
            if (result.new_characters && result.new_characters.length) {
              lines.push('', `⚠️ 检测到新角色名称，已自动创建占位文件，请等待维护者审核：${result.new_characters.join('、')}`);
            }
            const body = lines.join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
